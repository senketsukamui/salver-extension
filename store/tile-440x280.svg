<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 280" width="440" height="280">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="440" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.35"/>
    </filter>
    <clipPath id="panelClip">
      <rect x="232" y="24" width="188" height="234" rx="14"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="440" height="280" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g stroke="white" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="56"  x2="440" y2="56"/>
    <line x1="0" y1="112" x2="440" y2="112"/>
    <line x1="0" y1="168" x2="440" y2="168"/>
    <line x1="0" y1="224" x2="440" y2="224"/>
    <line x1="88"  y1="0" x2="88"  y2="280"/>
    <line x1="176" y1="0" x2="176" y2="280"/>
    <line x1="264" y1="0" x2="264" y2="280"/>
    <line x1="352" y1="0" x2="352" y2="280"/>
  </g>

  <!-- Left side — logo + wordmark -->
  <!-- Logo mark -->
  <g transform="translate(40, 72)">
    <!-- Shelf items -->
    <rect x="0"  y="0"  width="18" height="44" rx="4" fill="white"/>
    <rect x="0"  y="0"  width="18" height="8"  rx="4" fill="#93c5fd" opacity="0.7"/>
    <rect x="0"  y="4"  width="18" height="4"  rx="0" fill="#93c5fd" opacity="0.7"/>
    <rect x="24" y="12" width="18" height="32" rx="4" fill="white" opacity="0.82"/>
    <rect x="48" y="22" width="16" height="22" rx="4" fill="white" opacity="0.6"/>
    <!-- Shelf line -->
    <rect x="-4" y="44" width="72" height="6"  rx="3" fill="white" opacity="0.95"/>
  </g>

  <!-- Wordmark -->
  <text x="40" y="162"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
    font-size="36" font-weight="700" fill="white" letter-spacing="-0.5">
    Salver
  </text>

  <!-- Tagline -->
  <text x="40" y="188"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
    font-size="13" font-weight="400" fill="white" opacity="0.7" letter-spacing="0.1">
    Your shelf for snippets, links &amp; files
  </text>

  <!-- Feature pills -->
  <g transform="translate(40, 210)">
    <!-- Pill 1 -->
    <rect width="72" height="22" rx="11" fill="white" opacity="0.12"/>
    <text x="36" y="15" text-anchor="middle"
      font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
      font-size="11" font-weight="600" fill="white" opacity="0.9">
      Copy fast
    </text>
    <!-- Pill 2 -->
    <rect x="80" width="80" height="22" rx="11" fill="white" opacity="0.12"/>
    <text x="120" y="15" text-anchor="middle"
      font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
      font-size="11" font-weight="600" fill="white" opacity="0.9">
      Attach files
    </text>
    <!-- Pill 3 -->
    <rect x="168" width="72" height="22" rx="11" fill="white" opacity="0.12"/>
    <text x="204" y="15" text-anchor="middle"
      font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
      font-size="11" font-weight="600" fill="white" opacity="0.9">
      Local-first
    </text>
  </g>

  <!-- Right side — panel mockup -->
  <rect x="232" y="24" width="188" height="234" rx="14" fill="url(#panel)" filter="url(#shadow)"/>

  <!-- Panel header -->
  <rect x="232" y="24" width="188" height="44" rx="14" fill="#f8fafc"/>
  <rect x="232" y="52" width="188" height="16" fill="#f8fafc"/>
  <!-- Logo in header -->
  <g transform="translate(250, 37)" fill="#2563eb">
    <rect x="0"  y="0"  width="5" height="12" rx="1.5"/>
    <rect x="0"  y="0"  width="5" height="3"  rx="1.5" opacity="0.5"/>
    <rect x="7"  y="3"  width="5" height="9"  rx="1.5" opacity="0.75"/>
    <rect x="14" y="6"  width="4" height="6"  rx="1.5" opacity="0.5"/>
    <rect x="-1" y="12" width="20" height="2.5" rx="1.25"/>
  </g>
  <!-- Add button -->
  <rect x="368" y="33" width="40" height="22" rx="5" fill="#2563eb"/>
  <text x="388" y="48" text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
    font-size="10" font-weight="600" fill="white">
    ＋ Add
  </text>
  <!-- Divider -->
  <line x1="232" y1="68" x2="420" y2="68" stroke="#e9ecef" stroke-width="1"/>

  <!-- Search bar -->
  <rect x="244" y="76" width="164" height="24" rx="6" fill="#f1f3f5"/>
  <text x="256" y="92"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
    font-size="10" fill="#adb5bd">
    Search…
  </text>

  <!-- Folder pills -->
  <rect x="244" y="108" width="40" height="18" rx="9" fill="#eff6ff"/>
  <text x="264" y="121" text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
    font-size="9" font-weight="600" fill="#2563eb">
    All
  </text>
  <rect x="290" y="108" width="54" height="18" rx="9" fill="#f1f3f5"/>
  <text x="317" y="121" text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
    font-size="9" fill="#6c757d">
    Unfiled
  </text>
  <rect x="350" y="108" width="46" height="18" rx="9" fill="#f1f3f5"/>
  <text x="373" y="121" text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
    font-size="9" fill="#6c757d">
    Work
  </text>

  <!-- Row 1 — snippet -->
  <line x1="232" y1="135" x2="420" y2="135" stroke="#e9ecef" stroke-width="1"/>
  <rect x="244" y="142" width="3" height="14" rx="1.5" fill="#2563eb" opacity="0.4"/>
  <text x="253" y="152"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
    font-size="10" font-weight="600" fill="#212529">
    Cover letter — General
  </text>
  <text x="253" y="164"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
    font-size="9" fill="#6c757d">
    I'm a product engineer with 5 years…
  </text>
  <rect x="374" y="144" width="34" height="18" rx="4" fill="#f0fdf4"/>
  <text x="391" y="157" text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
    font-size="9" font-weight="600" fill="#16a34a">
    Copy
  </text>

  <!-- Row 2 — file -->
  <line x1="232" y1="172" x2="420" y2="172" stroke="#e9ecef" stroke-width="1"/>
  <text x="244" y="186"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
    font-size="12">
    📄
  </text>
  <text x="260" y="185"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
    font-size="10" font-weight="600" fill="#212529">
    resume-2026.pdf
  </text>
  <text x="260" y="197"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
    font-size="9" fill="#adb5bd">
    284 KB
  </text>
  <rect x="366" y="177" width="42" height="18" rx="4" fill="#f0fdf4"/>
  <text x="387" y="190" text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
    font-size="9" font-weight="600" fill="#16a34a">
    Attach
  </text>

  <!-- Row 3 — link -->
  <line x1="232" y1="207" x2="420" y2="207" stroke="#e9ecef" stroke-width="1"/>
  <text x="244" y="221"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
    font-size="12">
    🔗
  </text>
  <text x="260" y="220"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
    font-size="10" font-weight="600" fill="#212529">
    Portfolio
  </text>
  <text x="260" y="232"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
    font-size="9" fill="#0891b2">
    https://gleb.dev
  </text>
  <rect x="374" y="213" width="34" height="18" rx="4" fill="#f0fdf4"/>
  <text x="391" y="226" text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
    font-size="9" font-weight="600" fill="#16a34a">
    Copy
  </text>
</svg>
