<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>

  <!-- Shelf items — three blocks of decreasing height, bottoms aligned -->
  <!-- Tall item -->
  <rect x="20" y="30" width="26" height="52" rx="6" fill="white"/>
  <!-- Accent tab on tall item -->
  <rect x="20" y="30" width="26" height="10" rx="6" fill="#93c5fd" opacity="0.7"/>
  <rect x="20" y="36" width="26" height="4" rx="0" fill="#93c5fd" opacity="0.7"/>

  <!-- Medium item -->
  <rect x="52" y="44" width="26" height="38" rx="6" fill="white" opacity="0.82"/>

  <!-- Short item -->
  <rect x="84" y="56" width="22" height="26" rx="6" fill="white" opacity="0.6"/>

  <!-- Shelf line -->
  <rect x="14" y="82" width="100" height="8" rx="4" fill="white" opacity="0.95"/>
</svg>
