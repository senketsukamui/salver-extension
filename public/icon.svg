<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
    <linearGradient id="silverTop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
    <linearGradient id="silverBase" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e2e8f0"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="128" height="128" rx="26" fill="url(#bg)"/>

  <!-- ── Salver (silver serving tray) ── -->

  <!-- Tray platter — rim (outer ellipse, slight depth) -->
  <ellipse cx="64" cy="52" rx="52" ry="15" fill="#94a3b8" filter="url(#shadow)"/>
  <!-- Tray platter — main surface -->
  <ellipse cx="64" cy="50" rx="52" ry="15" fill="url(#silverTop)"/>
  <!-- Tray platter — inner surface -->
  <ellipse cx="64" cy="49" rx="44" ry="10" fill="#f1f5f9"/>
  <!-- Tray platter — inner shine -->
  <ellipse cx="58" cy="46" rx="20" ry="4" fill="white" opacity="0.45"/>

  <!-- ── Items sitting on the tray ── -->

  <!-- Document card 1 (left, slightly tilted back) -->
  <g transform="translate(28, 18) rotate(-4, 18, 20)">
    <rect width="30" height="35" rx="4" fill="#e0f2fe" stroke="#bae6fd" stroke-width="1"/>
    <rect width="30" height="10" rx="4" fill="#38bdf8" opacity="0.7"/>
    <rect y="6" width="30" height="4" rx="0" fill="#38bdf8" opacity="0.7"/>
    <rect x="4" y="15" width="22" height="2.5" rx="1.25" fill="#7dd3fc"/>
    <rect x="4" y="20" width="18" height="2.5" rx="1.25" fill="#bae6fd"/>
    <rect x="4" y="25" width="20" height="2.5" rx="1.25" fill="#bae6fd"/>
  </g>

  <!-- Document card 2 (center, upright) -->
  <g transform="translate(49, 14)">
    <rect width="30" height="38" rx="4" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <rect width="30" height="11" rx="4" fill="#2563eb"/>
    <rect y="7" width="30" height="4" rx="0" fill="#2563eb"/>
    <rect x="4" y="16" width="22" height="2.5" rx="1.25" fill="#93c5fd"/>
    <rect x="4" y="21" width="16" height="2.5" rx="1.25" fill="#bfdbfe"/>
    <rect x="4" y="26" width="20" height="2.5" rx="1.25" fill="#bfdbfe"/>
    <rect x="4" y="31" width="14" height="2.5" rx="1.25" fill="#dbeafe"/>
  </g>

  <!-- Document card 3 (right, slightly tilted) -->
  <g transform="translate(72, 19) rotate(3, 15, 18)">
    <rect width="28" height="32" rx="4" fill="#fef9c3" stroke="#fde68a" stroke-width="1"/>
    <rect width="28" height="9" rx="4" fill="#f59e0b" opacity="0.8"/>
    <rect y="5" width="28" height="4" rx="0" fill="#f59e0b" opacity="0.8"/>
    <rect x="4" y="14" width="20" height="2.5" rx="1.25" fill="#fcd34d"/>
    <rect x="4" y="19" width="16" height="2.5" rx="1.25" fill="#fde68a"/>
    <rect x="4" y="24" width="18" height="2.5" rx="1.25" fill="#fde68a"/>
  </g>

  <!-- ── Pedestal / stem ── -->
  <rect x="58" y="64" width="16" height="16" rx="5" fill="url(#silverBase)"/>
  <!-- Stem highlight -->
  <rect x="60" y="66" width="5" height="12" rx="2" fill="white" opacity="0.25"/>

  <!-- ── Base foot ── -->
  <!-- Base shadow -->
  <ellipse cx="64" cy="85" rx="28" ry="9" fill="#1e40af" opacity="0.3"/>
  <!-- Base body -->
  <ellipse cx="64" cy="83" rx="28" ry="9" fill="url(#silverBase)"/>
  <!-- Base top highlight -->
  <ellipse cx="64" cy="81" rx="22" ry="6" fill="url(#silverTop)"/>
  <!-- Base shine -->
  <ellipse cx="58" cy="79" rx="8" ry="2.5" fill="white" opacity="0.4"/>
</svg>
